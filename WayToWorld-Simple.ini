; ==========================================================
; - 使用 GEOSITE / GEOIP 为主
; - 五个国家地区可选
; ==========================================================
[custom]
enable_rule_generator=true
overwrite_original_rules=true

[dns]
; 基础运行设置
enable = true
cache-algorithm = arc
listen = 0.0.0.0:1053
; 家里未开启 IPv6，关闭以确保稳定性，防止 DNS 泄漏与超时
ipv6 = false
use-hosts = true
use-system-hosts = true
respect-rules = false
enhanced-mode = fake-ip
fake-ip-range = 198.18.0.1/16
; --- Fake-IP 过滤列表 ---
fake-ip-filter = geosite:private, geosite:cn, geosite:apple-cn, geosite:google-cn, mesu.apple.com, swscan.apple.com, swquery.apple.com, swdownload.apple.com, swcdn.apple.com, swdist.apple.com, +.services.googleapis.cn, +.xn--ngstr-lra8j.com, lens.l.google.com, *.lan, *.local, *.localdomain, *.localhost, *.test, *.example, *.invalid, *.home.arpa, localhost, time.*.com, time.*.gov, time.*.apple.com, +.pool.ntp.org, +.ntp.tencent.com, +.ntp1.aliyun.com, +.ntp.ntsc.ac.cn, +.cn.ntp.org.cn, *.microsoftonline.com, *.microsoft.com, *.msftconnecttest.com, *.msftncsi.com, *.wql.us, msftconnecttest.com, msftncsi.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.*.microsoft.com, *.xboxlive.com, *.keywordsstudios.cn, stun.*.*, stun.*.*.*, +.stun.*.*, +.stun.*.*.*, *.router.asus.com, *.linksys.com, *.linksyssmartwifi.com
; --- 上游 DNS 服务器  ---
; 用于解析加密 DNS 域名
default-nameserver = 223.5.5.5, 119.29.29.29
; 国内域名解析
nameserver = 223.5.5.5, 119.29.29.29
; 国外加密解析
fallback = tls://1.1.1.1, tls://8.8.8.8
; 专门解析代理服务器域名
proxy-server-nameserver = https://dns.alidns.com/dns-query, https://doh.pub/dns-query
; 直连流量专属 DNS
direct-nameserver = system, https://dns.alidns.com/dns-query, https://doh.pub/dns-query
direct-nameserver-follow-policy = false
; --- Fallback Filter ---
fallback-filter = true
fallback-filter-geoip = true
fallback-filter-geoip-code = CN
fallback-filter-geosite = gfw, youtube
fallback-filter-domain = +.google.com, +.facebook.com, +.twitter.com, +.telegram.org

[rewrite]
; 将谷歌中国重定向至全球站
^https?:\/\/(www.)?g\.cn https://www.google.com 302
^https?:\/\/(www.)?google\.cn https://www.google.com 302


; ==========================================================
; 节点清洗：剔除节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

;A. 策略组
; ==========================================================
; 1) 总策略组
; ==========================================================
custom_proxy_group=Proxy`select`[]全部节点`[]自动选择`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]冷门节点
; ==========================================================
; 2) 应用分流策略组
; ==========================================================
custom_proxy_group=Media`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
custom_proxy_group=AI`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
custom_proxy_group=Game`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
custom_proxy_group=Google`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
; Bahamut：台湾节点优先
custom_proxy_group=Bahamut`select`[]台湾节点`[]DIRECT`[]Proxy`[]香港节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
; 允许直连优先
custom_proxy_group=Bilibili`select`[]DIRECT`[]Proxy`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
custom_proxy_group=Apple`select`[]DIRECT`[]Proxy`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
custom_proxy_group=Microsoft`select`[]DIRECT`[]Proxy`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
custom_proxy_group=Github`select`[]DIRECT`[]Proxy`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
; Adobe：提供 REJECT 选项
custom_proxy_group=Adobe`select`[]Proxy`[]DIRECT`REJECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]香港故转`[]台湾自动`[]冷门节点
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]DIRECT
; ==========================================================
;2) 地区分流策略组 
; ==========================================================
; 全部节点选择
custom_proxy_group=全部节点`select`.*
custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`600,,150
;地区节点组
;地区节点组
custom_proxy_group=香港节点`select`[]香港自动`[]香港故转`(?i)(香港|\bHKG?|HongKong|Kowloon)
custom_proxy_group=台湾节点`select`[]台湾自动`(?i)(台湾|\bTWN?|Taiwan|Taipei|Hinet)
custom_proxy_group=日本节点`select`[]日本自动`(?i)(日本|\bJPN?|Japan|Tokyo|Osaka|Nagoya|Narita|Haneda)
custom_proxy_group=新加坡节点`select`[]新加坡自动`(?i)(新加坡|\bSGP?|Singapore|Lion)
custom_proxy_group=美国节点`select`[]美国自动`(?i)(美国|\bUSA?|America|States|Los\s*Angeles|San\s*Jose|Seattle|New\s*York|Chicago)
; 冷门节点
custom_proxy_group=冷门节点`select`(?i)^(?!.*(香港|\bHKG?|HongKong|Kowloon|台湾|\bTWN?|Taiwan|Taipei|Hinet|日本|\bJPN?|Japan|Tokyo|Osaka|Nagoya|Narita|Haneda|新加坡|\bSGP?|Singapore|Lion|美国|\bUSA?|America|States|Los\s*Angeles|San\s*Jose|Seattle|New\s*York|Chicago)).*
; 地区节点测速和故障转移选择
custom_proxy_group=香港自动`url-test`(?i)(香港|\bHKG?|HongKong|Kowloon)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=台湾自动`url-test`(?i)(台湾|\bTWN?|Taiwan|Taipei|Hinet)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=日本自动`url-test`(?i)(日本|\bJPN?|Japan|Tokyo|Osaka|Nagoya|Narita|Haneda)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=新加坡自动`url-test`(?i)(新加坡|\bSGP?|Singapore|Lion)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=美国自动`url-test`(?i)(美国|\bUSA?|America|States|Los\s*Angeles|San\s*Jose|Seattle|New\s*York|Chicago)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=香港故转`fallback`(?i)(香港|\bHKG?|HongKong|Kowloon)`http://www.gstatic.com/generate_204`300

; ==========================================================
; ==========================================================
; B 规则（自上而下优先级）
; ==========================================================
;自定规则
ruleset=Proxy,[]DOMAIN-KEYWORD,txtnovel
ruleset=Proxy,[]DOMAIN-SUFFIX,bing.com
ruleset=Proxy,[]DOMAIN-SUFFIX,bing.net
;ruleset=Proxy,[]GEOSITE,bing
ruleset=Proxy,[]GEOSITE,accuweather
ruleset=Direct,[]GEOSITE,dji

; --- 局域网防泄漏 ---
ruleset=Direct,[]GEOSITE,private
ruleset=Direct,[]GEOIP,private,no-resolve
; --- 国内可用 / 下载 / BT ---
ruleset=Direct,[]GEOSITE,google-cn
ruleset=Direct,[]GEOSITE,category-games@cn
ruleset=Direct,[]GEOSITE,category-game-platforms-download
ruleset=Direct,[]GEOSITE,category-public-tracker
