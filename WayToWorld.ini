[custom]
; ==========================================================
; - 使用 GEOSITE / GEOIP 为主
; - 五个国家地区可选
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

;A. 策略组
; ==========================================================
; 1) 总策略组
; ==========================================================
custom_proxy_group=Proxy`select`[]全部节点`[]自动选择`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]冷门节点
; ==========================================================
; 2) 应用分流策略组
; ==========================================================
custom_proxy_group=Media`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
custom_proxy_group=AI`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
custom_proxy_group=Game`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
; Bahamut：台湾节点优先
custom_proxy_group=Bahamut`select`[]台湾节点`[]DIRECT`[]Proxy`[]香港节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
; Bilibili：允许直连优先
custom_proxy_group=Bilibili`select`[]DIRECT`[]Proxy`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
custom_proxy_group=Apple`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
custom_proxy_group=Google`select`[]Proxy`[]DIRECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
; Microsoft：允许直连优先
custom_proxy_group=Microsoft`select`[]DIRECT`[]Proxy`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
; Adobe：提供 REJECT 选项一键禁联网
custom_proxy_group=Adobe`select`[]Proxy`[]DIRECT`REJECT`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]香港自动`[]台湾自动`[]日本自动`[]新加坡自动`[]美国自动`[]香港故转`[]台湾故转`[]日本故转`[]新加坡故转`[]美国故转`[]冷门节点
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]DIRECT
; ==========================================================
;2) 地区分流策略组 
; ==========================================================
; 全部节点选择
custom_proxy_group=全部节点`select`.*
custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`600,,150
;地区节点组
custom_proxy_group=香港节点`select`[]香港自动`[]香港故转`(?i)(香港|\bHK\b|\bHKG\b|HongKong|Kowloon)
custom_proxy_group=台湾节点`select`[]台湾自动`[]台湾故转`(?i)(台湾|\bTW\b|\bTWN\b|Taiwan|Taipei|Hinet)
custom_proxy_group=日本节点`select`[]日本自动`[]日本故转`(?i)(日本|\bJP\b|\bJPN\b|Japan|Tokyo|Osaka|Nagoya|Narita|Haneda)
custom_proxy_group=新加坡节点`select`[]新加坡自动`[]新加坡故转`(?i)(新加坡|\bSG\b|\bSGP\b|Singapore|Lion)
custom_proxy_group=美国节点`select`[]美国自动`[]美国故转`(美国|\bUS\b|\bUSA\b|America|States|Los\s*Angeles|San\s*Jose|Seattle|New\s*York|Chicago)
; 冷门节点（也要同步修改这里的排除逻辑，增加双斜杠）
custom_proxy_group=冷门节点`select`(?i)^(?!.*(香港|\bHK\b|\bHKG\b|HongKong|Kowloon|台湾|\bTW\b|\bTWN\b|Taiwan|Taipei|Hinet|日本|\bJP\b|\bJPN\b|Japan|Tokyo|Osaka|Nagoya|Narita|Haneda|新加坡|\bSG\b|\bSGP\b|Singapore|Lion|美国|\bUS\b|\bUSA\b|America|States|Los\s*Angeles|San\s*Jose|Seattle|New\s*York|Chicago)).*
; 地区节点测速和故障转移选择
custom_proxy_group=香港自动`url-test`(?i)(香港|\bHK\b|\bHKG\b|HongKong|Kowloon)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=台湾自动`url-test`(?i)(台湾|\bTW\b|\bTWN\b|Taiwan|Taipei|Hinet)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=日本自动`url-test`(?i)(日本|\bJP\b|\bJPN\b|Japan|Tokyo|Osaka|Nagoya|Narita|Haneda)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=新加坡自动`url-test`(?i)(新加坡|\bSG\b|\bSGP\b|Singapore|Lion)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=美国自动`url-test`(?i)(美国|\bUS\b|\bUSA\b|America|States|Los\s*Angeles|San\s*Jose|Seattle|New\s*York|Chicago)`http://www.gstatic.com/generate_204`600,,150
custom_proxy_group=香港故转`fallback`(?i)(香港|\bHK\b|\bHKG\b|HongKong|Kowloon)`http://www.gstatic.com/generate_204`300
custom_proxy_group=台湾故转`fallback`(?i)(台湾|\bTW\b|\bTWN\b|Taiwan|Taipei|Hinet)`http://www.gstatic.com/generate_204`300
custom_proxy_group=日本故转`fallback`(?i)(日本|\bJP\b|\bJPN\b|Japan|Tokyo|Osaka|Nagoya|Narita|Haneda)`http://www.gstatic.com/generate_204`300
custom_proxy_group=新加坡故转`fallback`(?i)(新加坡|\bSG\b|\bSGP\b|Singapore|Lion)`http://www.gstatic.com/generate_204`300
custom_proxy_group=美国故转`fallback`(?i)(美国|\bUS\b|\bUSA\b|America|States|Los\s*Angeles|San\s*Jose|Seattle|New\s*York|Chicago)`http://www.gstatic.com/generate_204`300

; ==========================================================
; ==========================================================
; B 规则（自上而下优先级）
; ==========================================================
;自定规则
ruleset=Proxy,[]DOMAIN-KEYWORD,txtnovel
ruleset=Proxy,[]DOMAIN-SUFFIX,bing.com
ruleset=Proxy,[]DOMAIN-SUFFIX,bing.net
;ruleset=Proxy,[]GEOSITE,bing
ruleset=Proxy,[]GEOSITE,accuweather
ruleset=Direct,[]GEOSITE,dji

; --- 局域网防泄漏 ---
ruleset=Direct,[]GEOSITE,private
ruleset=Direct,[]GEOIP,private,no-resolve
; --- 国内可用 / 下载 / BT ---
ruleset=Direct,[]GEOSITE,google-cn
ruleset=Direct,[]GEOSITE,category-games@cn
ruleset=Direct,[]GEOSITE,category-game-platforms-download
ruleset=Direct,[]GEOSITE,category-public-tracker
; --- 核心应用 ---
ruleset=Media,[]GEOSITE,netflix
ruleset=Media,[]GEOIP,netflix,no-resolve
ruleset=Media,[]GEOSITE,disney
ruleset=Media,[]GEOSITE,youtube
; ruleset=AI,[]GEOSITE,category-ai-!cn
ruleset=AI,[]GEOSITE,openai
ruleset=AI,[]GEOSITE,anthropic
ruleset=AI,[]GEOSITE,google-deepmind
ruleset=AI,[]GEOSITE,google-gemini
ruleset=Game,[]GEOSITE,steam
ruleset=Game,[]GEOSITE,playstation
ruleset=Game,[]GEOSITE,nintendo
ruleset=Game,[]GEOSITE,epicgames
ruleset=Game,[]GEOSITE,ea
ruleset=Bahamut,[]GEOSITE,bahamut
ruleset=Bilibili,[]GEOSITE,bilibili
ruleset=Apple,[]GEOSITE,apple
ruleset=Apple,[]GEOIP,apple,no-resolve
ruleset=Google,[]GEOSITE,google
ruleset=Google,[]GEOIP,google,no-resolve
ruleset=Microsoft,[]GEOSITE,github
ruleset=Microsoft,[]GEOSITE,microsoft
ruleset=Adobe,[]GEOSITE,adobe
ruleset=Proxy,[]GEOSITE,category-speedtest
; --- 国内直连 ---
ruleset=Direct,[]GEOSITE,cn
;ruleset=Direct,[]GEOIP,cn
ruleset=Direct,[]GEOIP,cn,no-resolve
; --- 代理兜底 ---
;ruleset=Proxy,[]GEOSITE,gfw
ruleset=Proxy,[]GEOSITE,geolocation-!cn
; --- 最终兜底 ---
ruleset=Final,[]MATCH
